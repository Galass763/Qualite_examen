name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: passer
          MYSQL_DATABASE: assurance_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
    
    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
    
    - name: Run Checkstyle validation
      run: mvn checkstyle:check
      continue-on-error: false
    
    - name: Run unit tests
      run: mvn test -Dtest=*Test
      continue-on-error: false
    
    - name: Run integration tests
      run: mvn verify -Dtest=*IT,*IntegrationTest
      continue-on-error: false
    
    - name: Generate JaCoCo coverage report
      run: mvn jacoco:report
      continue-on-error: false
    
    - name: Build JAR file
      run: mvn package -DskipTests
      continue-on-error: false
    
    - name: Upload test reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-reports
        path: |
          target/surefire-reports/
          target/failsafe-reports/
          target/site/jacoco/
          target/jacoco-report/
          checkstyle-result.xml
        retention-days: 7
    
    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: application-jar
        path: target/*.jar
        retention-days: 7
    
    - name: Upload coverage to Codecov (optional)
      uses: codecov/codecov-action@v3
      with:
        file: ./target/site/jacoco/jacoco.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  quality-gate:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always()
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download test reports
      uses: actions/download-artifact@v4
      with:
        name: test-reports
        path: reports/
    
    - name: Check coverage threshold
      run: |
        if [ -f "reports/jacoco-report/jacoco.csv" ]; then
          COVERAGE=$(awk -F',' '{instruction_missed+=$4; instruction_covered+=$5} END {total=instruction_missed+instruction_covered; if(total>0) print (instruction_covered/total)*100; else print "0"}' reports/jacoco-report/jacoco.csv)
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% is below threshold 80%"
            exit 1
          else
            echo "✅ Coverage ${COVERAGE}% meets threshold 80%"
          fi
        else
          echo "⚠️ JaCoCo report not found"
        fi
    
    - name: Check test success rate
      run: |
        if [ -f "reports/surefire-reports/TEST-*.xml" ]; then
          FAILED_TESTS=$(grep -l 'failures="[1-9]' reports/surefire-reports/TEST-*.xml | wc -l)
          if [ $FAILED_TESTS -gt 0 ]; then
            echo "❌ There are failing tests"
            exit 1
          else
            echo "✅ All tests passed"
          fi
        fi

  sonarcloud:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: false  # Disable by default, enable if you have SonarCloud token
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    

  notify:
    runs-on: ubuntu-latest
    needs: [build-and-test, quality-gate]
    if: always()
    
    steps:
    - name: Send notification
      uses: actions/github-script@v7
      with:
        script: |
          const status = '${{ needs.build-and-test.result }}';
          const quality = '${{ needs.quality-gate.result }}';
          let message = 'Pipeline Status:\n';
          message += `- Build & Test: ${status}\n`;
          message += `- Quality Gate: ${quality}\n`;
          
          if (status === 'success' && quality === 'success') {
            message += '✅ All checks passed!';
          } else {
            message += '❌ Some checks failed. Please check the logs.';
          }
          
          console.log(message);